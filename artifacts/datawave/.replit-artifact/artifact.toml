kind = "data-app"
previewPath = "/"
title = "DataWave"
version = "1.0.0"
id = "artifacts/datawave"
router = "path"

[[integratedSkills]]
name = "data-visualization"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 25483

[services.development]
run = "pnpm --filter @workspace/datawave run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/datawave", "run", "build" ]
publicDir = "artifacts/datawave/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "25483"
BASE_PATH = "/"
